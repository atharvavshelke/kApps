<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Proxy Browser</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="browser-container">
        <!-- Browser Chrome (Top Bar) -->
        <div class="browser-toolbar">
            <div class="window-controls">
                <span class="control close"></span>
                <span class="control minimize"></span>
                <span class="control maximize"></span>
            </div>
            
            <div class="navigation-controls">
                <button id="back-btn" class="nav-btn" title="Back"><i class="fas fa-arrow-left"></i></button>
                <button id="forward-btn" class="nav-btn" title="Forward"><i class="fas fa-arrow-right"></i></button>
                <button id="reload-btn" class="nav-btn" title="Reload"><i class="fas fa-redo"></i></button>
            </div>

            <div class="address-bar-container">
                <i class="fas fa-lock security-icon"></i>
                <input type="text" id="url-input" class="address-bar" placeholder="Search or enter web address" value="https://wikipedia.org">
                <button id="go-btn" class="go-btn" title="Go"><i class="fas fa-arrow-right"></i></button>
            </div>
            
            <div class="extensions-controls">
                <button class="nav-btn"><i class="fas fa-puzzle-piece"></i></button>
                <button class="nav-btn"><i class="fas fa-bars"></i></button>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="browser-content">
            <div id="loading-overlay" class="hidden">
                 <div class="spinner"></div>
            </div>
            <iframe id="browser-frame" src="about:blank" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
